server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for dynamic upstream proxying
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # API proxy - forwards requests to external video APIs, bypassing CORS
    # Usage: /proxy/<encoded_target_url>
    # The target URL is percent-encoded so forward slashes become %2F
    # and nginx sees it as one path segment: /proxy/https%3A%2F%2F...
    location ~ ^/proxy/https?%3A%2F%2F(.+)$ {
        # Extract host (first %2F-delimited segment)
        set $target_host $1;
        rewrite ^/proxy/https?%3A%2F%2F[^/]+(.*)$ $1 break;

        proxy_pass http://$target_host$uri$is_args$args;
        proxy_set_header Host $target_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        add_header Access-Control-Allow-Headers '*' always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
